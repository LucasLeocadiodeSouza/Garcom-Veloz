<div class="home-page">
    <app-topbar [pageTitle]="'Dashboard'" />

    <div class="page-content">
        <!-- Welcome Banner -->
        <div class="welcome-banner">
            <div class="welcome-text">
                <h1>Bem-vindo ao GarçomVeloz CRM</h1>
                <p>Gerencie produtos, usuários e relatórios do seu sistema em um só lugar.</p>
            </div>
            <div class="welcome-illustration">
                <svg width="120" height="100" viewBox="0 0 120 100" fill="none">
                    <rect x="10" y="20" width="100" height="65" rx="8" fill="rgba(255,255,255,0.15)" />
                    <rect x="20" y="30" width="40" height="6" rx="3" fill="rgba(255,255,255,0.6)" />
                    <rect x="20" y="42" width="28" height="4" rx="2" fill="rgba(255,255,255,0.4)" />
                    <rect x="20" y="54" width="35" height="4" rx="2" fill="rgba(255,255,255,0.4)" />
                    <rect x="68" y="30" width="32" height="45" rx="4" fill="rgba(255,255,255,0.2)" />
                    <rect x="73" y="36" width="22" height="4" rx="2" fill="rgba(255,255,255,0.5)" />
                    <rect x="73" y="46" width="18" height="4" rx="2" fill="rgba(255,255,255,0.35)" />
                    <rect x="73" y="56" width="22" height="4" rx="2" fill="rgba(255,255,255,0.35)" />
                    <circle cx="96" cy="18" r="10" fill="rgba(255,255,255,0.25)" />
                    <path d="M92 18l3 3 6-6" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" />
                </svg>
            </div>
        </div>

        <!-- Stats Row -->
        <app-stats-row></app-stats-row>

        <!-- Navigation Cards -->
        <app-navigation-cards></app-navigation-cards>

        <!-- Recent Activity -->
        <div class="bottom-grid">
            <app-recent-activity></app-recent-activity>

            <div class="card quick-actions-card">
                <div class="card-header">
                    <h3>Ações Rápidas</h3>
                </div>
                <div class="quick-actions-list">
                    @for (action of quickActions; track action.label) {
                    <a class="quick-action-btn" [href]="action.route">
                        <span>{{ action.label }}</span>
                    </a>
                    }
                </div>
            </div>
        </div>
    </div>
</div>
